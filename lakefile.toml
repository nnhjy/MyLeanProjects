name = "MyLeanProjects"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["MyLeanProjects"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.30.0"

[[lean_lib]]
name = "MyLeanProjects"

[[lean_lib]]
name = "FourierMotzkinElimination"

# Options scoped to the FourierMotzkinElimination library only (merged with the
# package-level [leanOptions] above; the `MyLeanProjects` library is unaffected).
[lean_lib.leanOptions]
warningAsError = false
weak.linter.style.emptyLine = false